<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a6847">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="FarmaFácil - Orçamentos para WhatsApp">
<title>FarmaFácil</title>

<style>
body{font-family:Arial;background:#f0f0f0;margin:0;padding:20px}
.container{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:10px}
button{background:#0a6847;color:#fff;border:none;border-radius:5px}
</style>
</head>

<body>

<div class="container">
<h2>FarmaFácil (Simplificado)</h2>

<input id="cliente" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone">

<input id="produto" placeholder="Produto">
<input id="preco" placeholder="Preço">
<input id="qtd" placeholder="Quantidade" value="1">

<button onclick="add()">Adicionar</button>

<pre id="lista"></pre>

<button onclick="gerar()">Gerar WhatsApp</button>
</div>

<script>
let itens=[];

function add(){
  const nome=document.getElementById('produto').value;
  const preco=parseFloat(document.getElementById('preco').value)||0;
  const qtd=parseInt(document.getElementById('qtd').value)||1;

  itens.push({nome,preco,qtd});
  render();
}

function render(){
  let txt='';
  itens.forEach(i=>{
    txt+=i.nome+' - '+i.qtd+'x R$'+i.preco+'\\n';
  });
  document.getElementById('lista').textContent=txt;
}

function gerar(){
  const cliente=document.getElementById('cliente').value;
  const tel=document.getElementById('telefone').value.replace(/\\D/g,'');

  let msg='📋 ORÇAMENTO\\n\\nCliente: '+cliente+'\\n\\n';

  let total=0;
  itens.forEach(i=>{
    const sub=i.preco*i.qtd;
    total+=sub;
    msg+=`${i.nome} - ${i.qtd}x R$${i.preco} = R$${sub}\\n`;
  });

  msg+='\\nTotal: R$'+total;

  const url='https://wa.me/55'+tel+'?text='+encodeURIComponent(msg);
  window.open(url);
}
</script>

</body>
</html>
