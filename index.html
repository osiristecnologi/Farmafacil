<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GW Wireless</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <img src="logo.png" class="logo">
    <span class="title">GW Wireless</span>
  </header>

  <!-- TELAS -->
  <main id="screen">

    <!-- HOME -->
    <section id="home" class="page active">
      <h2>Bem-vindo</h2>
      <div class="card" onclick="go('products')">
        <h3>🛒 Produtos</h3>
        <p>Veja os produtos disponíveis</p>
      </div>

      <div class="card" onclick="go('profile')">
        <h3>👤 Perfil</h3>
        <p>Gerencie sua conta</p>
      </div>
    </section>

    <!-- PRODUTOS -->
    <section id="products" class="page">
      <h2>Produtos</h2>
      <div class="grid" id="productList"></div>
    </section>

    <!-- PERFIL -->
    <section id="profile" class="page">
      <h2>Perfil</h2>
      <p>Área do usuário</p>
    </section>

  </main>

  <!-- NAV -->
  <nav class="nav">
    <button onclick="go('home')">🏠</button>
    <button onclick="go('products')">🛒</button>
    <button onclick="go('profile')">👤</button>
  </nav>

</div>

<script src="script.js"></script>
</body>
</html>
