<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GW Wireless</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <img src="logo.png" class="logo" />
      <h1>GW Wireless</h1>
    </header>

    <!-- CONTEÚDO -->
    <main class="content">
      
      <div class="card">
        <h2>Produtos</h2>
        <p>Veja os produtos disponíveis</p>
        <button onclick="alert('Abrir produtos')">Entrar</button>
      </div>

      <div class="card">
        <h2>Feed</h2>
        <p>Publicações dos usuários</p>
        <button onclick="alert('Abrir feed')">Ver Feed</button>
      </div>

      <div class="card">
        <h2>Perfil</h2>
        <p>Gerencie sua conta</p>
        <button onclick="alert('Abrir perfil')">Acessar</button>
      </div>

    </main>

    <!-- MENU -->
    <nav class="bottom-nav">
      <button>🏠</button>
      <button>🛒</button>
      <button>👤</button>
    </nav>

  </div>

  <script src="script.js"></script>
</body>
</html>
