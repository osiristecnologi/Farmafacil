<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>FarmaFácil</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiRmFybWFGw6FjaWwiLCJzaG9ydF9uYW1lIjoiRmFybWFGw6FjaWwiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBhNjg0NyIsInRoZW1lX2NvbG9yIjoiIzBhNjg0NyJ9">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans&display=swap" rel="stylesheet">

<style>
/* ===== CSS COMPLETO ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#eafcf4}
#app{max-width:480px;margin:auto}
.screen{display:none;padding:20px}
.screen.active{display:block}
.btn{padding:12px;width:100%;margin-top:10px;background:#0a6847;color:#fff;border:none;border-radius:8px}
input,select,textarea{width:100%;padding:10px;margin-top:5px}
.item{background:#fff;padding:10px;margin-top:10px;border-radius:8px}
</style>
</head>

<body>
<div id="app">

<!-- HOME -->
<div class="screen active" id="screen-home">
<h2>FarmaFácil</h2>
<button class="btn" onclick="navigateTo('products')">Produtos</button>
<button class="btn" onclick="navigateTo('clients')">Clientes</button>
<button class="btn" onclick="navigateTo('quote')">Orçamento</button>
</div>

<!-- PRODUCTS -->
<div class="screen" id="screen-products">
<h2>Produtos</h2>
<input id="prod-name" placeholder="Nome">
<input id="prod-price" placeholder="Preço">
<button class="btn" onclick="saveProduct()">Salvar</button>
<div id="prod-list"></div>
<button class="btn" onclick="navigateTo('home')">Voltar</button>
</div>

MEGA MEGALODON:
<!-- CLIENTS -->
<div class="screen" id="screen-clients">
<h2>Clientes</h2>
<input id="cli-name" placeholder="Nome">
<input id="cli-phone" placeholder="Telefone">
<button class="btn" onclick="saveClient()">Salvar</button>
<div id="cli-list"></div>
<button class="btn" onclick="navigateTo('home')">Voltar</button>
</div>

<!-- QUOTE -->
<div class="screen" id="screen-quote">
<h2>Orçamento</h2>

<select id="q-prod"></select>
<input id="q-qty" type="number" value="1">

<button class="btn" onclick="addItem()">Adicionar</button>

<div id="q-list"></div>
<h3 id="q-total">Total: R$ 0</h3>

<button class="btn" onclick="generate()">Gerar WhatsApp</button>
<button class="btn" onclick="navigateTo('home')">Voltar</button>
</div>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products') || '[]')
let clients = JSON.parse(localStorage.getItem('clients') || '[]')
let items = []

function navigateTo(screen){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById('screen-'+screen).classList.add('active')
render()
}

function save(){
localStorage.setItem('products', JSON.stringify(products))
localStorage.setItem('clients', JSON.stringify(clients))
}

function saveProduct(){
let name = document.getElementById('prod-name').value
let price = parseFloat(document.getElementById('prod-price').value)

if(!name || !price) return alert('Preencha')

products.push({id:Date.now(), name, price})
save()
render()

document.getElementById('prod-name').value=''
document.getElementById('prod-price').value=''
}

function saveClient(){
let name = document.getElementById('cli-name').value
let phone = document.getElementById('cli-phone').value

if(!name || !phone) return alert('Preencha')

clients.push({id:Date.now(), name, phone})
save()
render()

document.getElementById('cli-name').value=''
document.getElementById('cli-phone').value=''
}

function render(){
document.getElementById('prod-list').innerHTML = products.map(p =>
<div class="item">${p.name} - R$ ${p.price}</div>
).join('')

document.getElementById('cli-list').innerHTML = clients.map(c =>
<div class="item">${c.name} - ${c.phone}</div>
).join('')

document.getElementById('q-prod').innerHTML = products.map(p =>
<option value="${p.id}">${p.name}</option>
).join('')
}

function addItem(){
let id = document.getElementById('q-prod').value
let qty = parseInt(document.getElementById('q-qty').value)

let p = products.find(x=>x.id==id)
items.push({name:p.name, price:p.price, qty})

renderQuote()
}

function renderQuote(){
let total = 0

document.getElementById('q-list').innerHTML = items.map(i=>{
let sub = i.price * i.qty
total += sub
return <div class="item">${i.name} x${i.qty} = R$ ${sub}</div>
}).join('')

document.getElementById('q-total').innerText = 'Total: R$ ' + total
}

function generate(){
let msg = 'Orçamento:\n'
let total = 0

items.forEach(i=>{
let sub = i.price * i.qty
total += sub
msg += ${i.name} x${i.qty} = R$ ${sub}\n
})

msg += 'Total: R$ ' + total

window.open('https://wa.me/?text=' + encodeURIComponent(msg))
}

render()

</script>

</body>
</html>
