<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="theme-color" content="#006400">
    <title>FarmaFácil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #006400;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 20px;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.08) 1%, transparent 2%),
                radial-gradient(circle at 70% 60%, rgba(255,255,255,0.06) 1%, transparent 2%);
            background-size: 80px 80px;
        }
        .logo-container {
            width: 110px;
            height: 110px;
            background: white;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }
        .pill {
            font-size: 68px;
            line-height: 1;
        }
        h1 {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 17px;
            opacity: 0.92;
            margin-bottom: 70px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            color: #222;
            border-radius: 18px;
            padding: 18px 20px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.18);
            cursor: pointer;
            transition: all 0.2s;
        }
        .card:active {
            transform: scale(0.97);
        }
        .card-icon {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .novo-icon { background: #e0f2e9; }
        .produtos-icon { background: #fff4d4; }
        .card-content h3 {
            font-size: 21px;
            font-weight: 600;
        }
        .card-content p {
            color: #666;
            font-size: 15px;
            margin-top: 2px;
        }
        .arrow {
            margin-left: auto;
            font-size: 24px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <span class="pill">💊</span>
    </div>

    <h1>FarmaFácil</h1>
    <p class="subtitle">Orçamentos para WhatsApp</p>

    <!-- Card Novo Orçamento -->
    <div class="card" onclick="novoOrcamento()">
        <div class="card-icon novo-icon">📋</div>
        <div class="card-content">
            <h3>Novo Orçamento</h3>
            <p>Monte e envie pelo WhatsApp</p>
        </div>
        <span class="arrow">›</span>
    </div>

    <!-- Card Produtos -->
    <div class="card" onclick="gerenciarProdutos()">
        <div class="card-icon produtos-icon">💊</div>
        <div class="card-content">
            <h3>Produtos</h3>
            <p id="status">Nenhum cadastrado</p>
        </div>
        <span class="arrow">›</span>
    </div>

<script>
    function novoOrcamento() {
        alert("Abrindo Novo Orçamento...\n\n(Coloque aqui o formulário antigo se quiser)");
        // Se quiser mostrar o formulário antigo, podemos fazer isso depois
    }

    function gerenciarProdutos() {
        alert("Gerenciar Produtos\n\nAinda nenhum produto cadastrado.");
    }
</script>

</body>
</html>
